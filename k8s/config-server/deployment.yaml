apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: config-server
          image: 045810265680.dkr.ecr.us-east-1.amazonaws.com/petclinic/config-server:9caf48e
          ports:
            - containerPort: 8888  # ✅ correct

          envFrom:
            - configMapRef:
                name: config-server-config  # ✅ fixed from 'app-config'
          env:
            - name: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MANAGEMENT_ZIPKIN_TRACING_ENDPOINT
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888  # ✅ correct
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888  # ✅ correct
            initialDelaySeconds: 60
            periodSeconds: 20

          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 768Mi
              cpu: 500m
