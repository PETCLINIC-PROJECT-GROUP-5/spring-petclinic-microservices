apiVersion: apps/v1
kind: Deployment
metadata:
  name: discovery-server
  namespace: petclinic

spec:
  replicas: 1

  selector:
    matchLabels:
      app: discovery-server

  template:
    metadata:
      labels:
        app: discovery-server

    spec:
      imagePullSecrets:
        - name: ecr-secret

      containers:
        - name: discovery-server
          image: 045810265680.dkr.ecr.us-east-1.amazonaws.com/petclinic/discovery-server:9caf48e

          ports:
            - containerPort: 8761  # ✅ correct

          envFrom:
            - configMapRef:
                name: discovery-config  # ✅ matches the ConfigMap above

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761  # ✅ correct
            initialDelaySeconds: 40
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761  # ✅ correct
            initialDelaySeconds: 80
            periodSeconds: 20

          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 768Mi
              cpu: 500m
