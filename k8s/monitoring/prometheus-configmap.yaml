apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/alert-rules.yml

    scrape_configs:
    - job_name: prometheus
      static_configs:
      - targets: ['localhost:9090']

    - job_name: api-gateway
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['api-gateway.petclinic.svc.cluster.local:8080']

    - job_name: customers-service
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['customers-service.petclinic.svc.cluster.local:8080']

    - job_name: visits-service
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['visits-service.petclinic.svc.cluster.local:8082']

    - job_name: vets-service
      metrics_path: /actuator/prometheus
      static_configs:
      - targets: ['vets-service.petclinic.svc.cluster.local:8083']
