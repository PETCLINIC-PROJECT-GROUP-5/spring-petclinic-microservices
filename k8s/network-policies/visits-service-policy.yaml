apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: visits-service-policy
  namespace: petclinic
spec:
  podSelector:
    matchLabels:
      app: visits-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8082
     - from:
         - namespaceSelector:
             matchLabels:
               kubernetes.io/metadata.name: monitoring
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: config-server
      ports:
        - protocol: TCP
          port: 8888
    - to:
        - podSelector:
            matchLabels:
              app: discovery-server
      ports:
        - protocol: TCP
          port: 8761
    - to:
        - podSelector:
            matchLabels:
              app: visits-db
      ports:
        - protocol: TCP
          port: 3306
    - to:
        - podSelector:
            matchLabels:
              app: zipkin
      ports:
        - protocol: TCP
          port: 9411
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
