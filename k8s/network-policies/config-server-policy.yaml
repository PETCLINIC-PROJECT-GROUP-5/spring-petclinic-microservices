apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: config-server-policy
  namespace: petclinic
spec:
  podSelector:
    matchLabels:
      app: config-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8888
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
