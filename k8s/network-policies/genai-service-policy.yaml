apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: genai-service-policy
  namespace: petclinic
spec:
  podSelector:
    matchLabels:
      app: genai-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8084
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: config-server
      ports:
        - protocol: TCP
          port: 8888
    - to:
        - podSelector:
            matchLabels:
              app: discovery-server
      ports:
        - protocol: TCP
          port: 8761
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
