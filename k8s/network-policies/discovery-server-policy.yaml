apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: discovery-server-policy
  namespace: petclinic
spec:
  podSelector:
    matchLabels:
      app: discovery-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8761
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: config-server
      ports:
        - protocol: TCP
          port: 8888
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
